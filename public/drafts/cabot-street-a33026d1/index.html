<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, nofollow" />
<title>Cabot Street — Draft</title>
<style>
  html, body {
    height: 100%;
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #111;
    color: #eee;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  }
  form {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 260px;
  }
  h1 {
    font-size: 16px;
    font-weight: 500;
    margin: 0 0 8px;
    color: #aaa;
  }
  input {
    font-size: 16px;
    padding: 10px 12px;
    border-radius: 6px;
    border: 1px solid #444;
    background: #1c1c1c;
    color: #eee;
  }
  button {
    font-size: 14px;
    padding: 10px 12px;
    border-radius: 6px;
    border: none;
    background: #eee;
    color: #111;
    cursor: pointer;
  }
  #err {
    color: #e66;
    font-size: 13px;
    min-height: 16px;
  }
</style>
</head>
<body>
<form id="gate">
  <h1>This is a private draft. Enter password to continue.</h1>
  <input type="password" id="pw" autocomplete="off" autofocus />
  <button type="submit">Enter</button>
  <div id="err"></div>
</form>
<script>
  document.getElementById('gate').addEventListener('submit', function (e) {
    e.preventDefault();
    var pw = document.getElementById('pw').value;
    if (pw === 'carrot12') {
      sessionStorage.setItem('cabot-street-a33026d1', '1');
      window.location.href = 'view.html';
    } else {
      document.getElementById('err').textContent = 'Incorrect password.';
    }
  });
</script>
</body>
</html>
